<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Section</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <section id="contact" class="contact-section">
        <div class="contact-container">
            <h2 class="section-title">Get in Touch.</h2>
            <p class="section-subtitle">Have a project in mind or just want to say hello?</p>

            <div class="contact-grid">
                <a href="mailto:hi@abhayrana.com" class="contact-card">
                    <div class="icon-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <span>hi@abhayrana.com</span>
                </a>

                <div class="contact-card">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <span>India</span>
                </div>
            </div>

            <div class="social-links">
                <a href="https://github.com/abhay-rana" target="_blank" class="social-icon" aria-label="GitHub">
                    <i class="fa-brands fa-github"></i> GitHub
                </a>
                <a href="https://www.linkedin.com/in/abhay-rana-0x/" target="_blank" class="social-icon" aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://x.com/Ranaji_0x" target="_blank" class="social-icon" aria-label="Twitter">
                    <i class="fa-brands fa-x-twitter"></i> Twitter
                </a>
            </div>

            <div class="cta-container">
                <a href="mailto:hi@abhayrana.com" class="btn-primary">
                    Send me an email
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
